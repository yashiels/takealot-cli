<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <style>
      .bg { fill: #1e1e2e; }
      .chrome { fill: #313244; }
      .dot-r { fill: #f38ba8; }
      .dot-y { fill: #f9e2af; }
      .dot-g { fill: #a6e3a1; }
      .title { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
      .prompt { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .cmd { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .header { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .row { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .price { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .stars { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
      .border { fill: #45475a; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
    </style>
  </defs>
  <!-- Window -->
  <rect class="bg" width="800" height="380" rx="10"/>
  <!-- Title bar -->
  <rect class="chrome" width="800" height="36" rx="10"/>
  <rect class="chrome" x="0" y="20" width="800" height="16"/>
  <!-- Traffic lights -->
  <circle class="dot-r" cx="20" cy="18" r="6"/>
  <circle class="dot-y" cx="40" cy="18" r="6"/>
  <circle class="dot-g" cx="60" cy="18" r="6"/>
  <!-- Title -->
  <text class="title" x="400" y="22" text-anchor="middle">takealot</text>

  <!-- Terminal content -->
  <text class="prompt" x="20" y="70">$</text>
  <text class="cmd" x="36" y="70"> takealot search "wireless earbuds"</text>

  <text class="border" x="20" y="100">  ┌────┬────────────────────────────────┬────────┬────────┐</text>
  <text class="header" x="20" y="120">  │  # │ Product                        │  Price │ Rating │</text>
  <text class="border" x="20" y="140">  ├────┼────────────────────────────────┼────────┼────────┤</text>
  <text class="row"    x="20" y="160">  │  1 │ Samsung Galaxy Buds3 Pro       │</text>
  <text class="price"  x="480" y="160">R4,999</text>
  <text class="row"    x="540" y="160">│</text>
  <text class="stars"  x="556" y="160">★★★★☆</text>
  <text class="row"    x="620" y="160">│</text>
  <text class="row"    x="20" y="180">  │  2 │ JBL Tune Beam                  │</text>
  <text class="price"  x="480" y="180">R1,299</text>
  <text class="row"    x="540" y="180">│</text>
  <text class="stars"  x="556" y="180">★★★★★</text>
  <text class="row"    x="620" y="180">│</text>
  <text class="row"    x="20" y="200">  │  3 │ Sony WF-1000XM5                │</text>
  <text class="price"  x="480" y="200">R5,999</text>
  <text class="row"    x="540" y="200">│</text>
  <text class="stars"  x="556" y="200">★★★★★</text>
  <text class="row"    x="620" y="200">│</text>
  <text class="row"    x="20" y="220">  │  4 │ Apple AirPods Pro 2            │</text>
  <text class="price"  x="480" y="220">R4,499</text>
  <text class="row"    x="540" y="220">│</text>
  <text class="stars"  x="556" y="220">★★★★☆</text>
  <text class="row"    x="620" y="220">│</text>
  <text class="border" x="20" y="240">  └────┴────────────────────────────────┴────────┴────────┘</text>

  <text class="dim" x="20" y="270">  4 of 238 results — page 1</text>

  <text class="prompt" x="20" y="300">$</text>
  <text class="cmd" x="36" y="300"> takealot wishlist add 2</text>
  <text class="row" x="20" y="320">  ✓ Added "JBL Tune Beam" to wishlist</text>

  <text class="prompt" x="20" y="350">$</text>
  <text class="dim" x="36" y="350">█</text>
</svg>
